version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beatconnect-db
    environment:
      POSTGRES_USER: beatconnect
      POSTGRES_PASSWORD: beatconnect_secret
      POSTGRES_DB: beatconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - beatconnect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beatconnect -d beatconnect"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beatconnect-backend
    environment:
      DATABASE_URL: postgresql://beatconnect:beatconnect_secret@postgres:5432/beatconnect
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3001
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - beatconnect-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beatconnect-frontend
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - beatconnect-network
    command: npm run dev -- --host

networks:
  beatconnect-network:
    driver: bridge

volumes:
  postgres_data:
